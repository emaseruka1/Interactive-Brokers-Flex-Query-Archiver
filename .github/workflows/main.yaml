name: GitHub Actions Pipeline

on:
  push:
    branches:
      - main

jobs:
  checkout:
    name: Checkout Repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

  build:
    name: Build Project
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Compile Jar
        run: mvn clean package -Dspring.profiles.active=test -DskipTests --fail-at-end -X

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: jar-file
          path: target/*.jar

  upload:
    name: GCP ArtifactRegistry Upload
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Jar
        uses: actions/download-artifact@v4
        with:
          name: jar-file
          path: target/

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_AUTH_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-central2-docker.pkg.dev

      - name: Build Docker Image
        run: |
          docker build -t europe-central2-docker.pkg.dev/ibkr-portfolio-tracker-476008/interactive-brokers-flex-query-archiver/interactive-brokers-flex-query-archiver:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push europe-central2-docker.pkg.dev/ibkr-portfolio-tracker-476008/interactive-brokers-flex-query-archiver/interactive-brokers-flex-query-archiver:${{ github.sha }}